# Release automation for nyc-311-mcp.
#
# Publishes @betanyc/nyc-311-mcp to npm and creates a GitHub Release
# whenever a version tag (v*) is pushed. Part of the fleet-wide
# release-hygiene rollout across BetaNYC's six public MCP repos.
#
# Flow: push a tag like v1.0.1 → this workflow checks the tag matches
# package.json's version, runs tests (if present), publishes to npm with
# provenance, and creates a GitHub Release with auto-generated notes.
#
# Prerequisite: an NPM_TOKEN repository secret (npm automation token with
# publish rights on @betanyc/nyc-311-mcp). id-token: write enables npm
# provenance attestation; contents: write lets the workflow create the
# GitHub Release.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
